<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional Geometric Shield -->
  <path d="M50 5 L12 22 V48 C12 75 50 95 50 95 C50 95 88 75 88 48 V22 L50 5Z" fill="url(#mainGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  
  <!-- Internal Highlight Layer -->
  <path d="M50 12 L20 28 V50 C20 70 50 88 50 88 C50 88 80 70 80 50 V28 L50 12Z" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Logo Content: Stylized 'A' -->
  <path d="M50 20 L32 62 H41 L45 52 H55 L59 62 H68 L50 20ZM50 32 L54 44 H46 L50 32Z" fill="white" filter="url(#glow)"/>
  
  <!-- Logo Content: 'IDS' Text -->
  <text x="50" y="78" fill="white" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="14" text-anchor="middle" letter-spacing="1" filter="url(#glow)">IDS</text>

  <defs>
    <!-- Vibrant Blue-Indigo Gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Subtle Glow Filter for the 'A' and 'IDS' -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
