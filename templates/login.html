<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - AdvancedIDS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-hero-gradient">
    <div class="login-wrapper">
        <div class="login-container text-center">
            <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="AdvancedIDS Logo" class="brand-logo mb-3">
            <h3 class="fw-bold mb-2">Zero-Trust Portal</h3>
            <p class="text-muted mb-4">Authenticate to access the IDS Command Center</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-danger small py-2">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3 text-start">
                    <label class="form-label small">Operator ID</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-user-shield text-muted"></i></span>
                        <input type="text" class="form-control" name="username" placeholder="admin" required>
                    </div>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small">Access Key</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-key text-muted"></i></span>
                        <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-custom w-100"><i class="fas fa-unlock"></i> Initialize Uplink</button>
            </form>
        </div>
    </div>
</body>
</html>
